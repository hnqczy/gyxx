<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园统一门户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        }

        /* 天蓝色科技渐变背景 */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a73e8 0%, #4285f4 35%, #5bacff 70%, #84b6ff 100%);
            background-attachment: fixed;
            color: #fff;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* 科技网格底纹 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* 顶部导航 */
        .navbar {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            height: 65px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .logo {
            height: 38px;
            margin-right: 14px;
        }

        .navbar-title {
            font-size: 21px;
            font-weight: 600;
            color: #ffffff;
        }

        /* 头部 */
        .hero {
            text-align: center;
            padding: 45px 20px 30px;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.15);
        }

        .hero p {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        /* 卡片：图标左 + 文字右 + 扁平等 */
        .card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            height: 80px; /* 卡片变矮 */
            display: flex;
            align-items: center;
            padding: 0 22px;
            gap: 18px;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            transition: all 0.28s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(66, 133, 244, 0.25);
        }

        /* 左侧图标 */
        .card-icon {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        /* 右侧文字 */
        .card-title {
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            flex: 1;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 24px;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .card {
                height: 72px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- 导航 -->
    <div class="navbar">
        <img src="https://via.placeholder.com/40" alt="LOGO" class="logo">
        <div class="navbar-title">智慧校园统一门户</div>
    </div>

    <!-- 标题 -->
    <div class="hero">
        <h1>SCMP@智慧校园统一信息门户</h1>
        <p>智慧校园综合服务平台</p>
    </div>

    <!-- 功能卡片 -->
    <div class="container">
        <div class="grid">
            <a href="media.html" class="card">
                <div class="card-icon"><i class="fas fa-bullhorn"></i></div>
                <div class="card-title">媒体宣传系统</div>
            </a>
            <a href="dispatch.html" class="card">
                <div class="card-icon"><i class="fas fa-city"></i></div>
                <div class="card-title">调度中心系统</div>
            </a>
            <a href="service.html" class="card">
                <div class="card-icon"><i class="fas fa-handshake"></i></div>
                <div class="card-title">群众服务系统</div>
            </a>
            <a href="grid.html" class="card">
                <div class="card-icon"><i class="fas fa-layer-group"></i></div>
                <div class="card-title">网格治理系统</div>
            </a>
            <a href="data.html" class="card">
                <div class="card-icon"><i class="fas fa-chart-bar"></i></div>
                <div class="card-title">数据管理系统</div>
            </a>
            <a href="screen.html" class="card">
                <div class="card-icon"><i class="fas fa-desktop"></i></div>
                <div class="card-title">数据展示大屏</div>
            </a>
            <a href="monitor.html" class="card">
                <div class="card-icon"><i class="fas fa-video"></i></div>
                <div class="card-title">天翼监控系统</div>
            </a>
            <a href="broadcast.html" class="card">
                <div class="card-icon"><i class="fas fa-volume-high"></i></div>
                <div class="card-title">天翼大喇叭</div>
            </a>
            <a href="kqkh.html" class="card">
                <div class="card-icon"><i class="fas fa-fire-flame-curved"></i></div>
                <div class="card-title">考勤考核系统</div>
            </a>
            <a href="https://vfqzxfqmsh.coze.site/" class="card">
                <div class="card-icon"><i class="fas fa-door-closed"></i></div>
                <div class="card-title">周报统计系统</div>
            </a>
            <a href="jiaowu.html" class="card">
                <div class="card-icon"><i class="fas fa-book"></i></div>
                <div class="card-title">教务管理系统</div>
            </a>
            <a href="config.html" class="card">
                <div class="card-icon"><i class="fas fa-sliders"></i></div>
                <div class="card-title">平台配置中心</div>
            </a>
        </div>
    </div>
</body>
</html>
